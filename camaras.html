<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Rednovatel</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        h1 { padding: 20px; margin: 0; background: #1a1a1a; font-size: 24px; color: #ff4d4d; }
        .mosaico { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        /* Ajustamos el tamaño para que quepan bien dos cámaras */
        iframe { width: 45%; height: 450px; border: 2px solid #333; background: #111; border-radius: 8px; }
        @media (max-width: 800px) { iframe { width: 95%; height: 300px; } }
    </style>
</head>
<body>
    <h1>🔴 Monitoreo en Vivo - Rednovatel</h1>
    
    <div class="mosaico">
        <!-- IMPORTANTE: Estas URLs deben ser las que configuraste en Cloudflare -->
        <iframe src="https://camara1.rednovatel.cl" title="Cámara 1" frameborder="0" allowfullscreen></iframe>
        <iframe src="https://camara2.rednovatel.cl" title="Cámara 2" frameborder="0" allowfullscreen></iframe>
    </div>

    <p style="color: #666; font-size: 12px;">Acceso Seguro vía Cloudflare Zero Trust</p>

    <script>
        // Esto evita que la transmisión se quede congelada por mucho tiempo
        setTimeout(() => { location.reload(); }, 600000); // 10 minutos
    </script>
</body>
</html>
